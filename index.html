<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Will you be my friend? 🐻</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #fff0f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #app {
      text-align: center;
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* QUESTION SCREEN */
    #question-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .sticker {
      font-size: 80px;
      animation: bounce 1.2s ease-in-out infinite;
      line-height: 1;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .question {
      font-size: 2rem;
      font-weight: 900;
      color: #c2185b;
    }

    .btn-row {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
    }

    #yes-btn {
      background: #e91e8c;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 40px;
      font-size: 1.2rem;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }
    #yes-btn:hover { background: #c2185b; transform: scale(1.06); }
    #yes-btn:active { transform: scale(0.97); }

    #no-btn {
      background: transparent;
      color: #bbb;
      border: 1.5px solid #ddd;
      border-radius: 50px;
      padding: 12px 32px;
      font-size: 1.1rem;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      position: fixed;
      transition: font-size 0.15s, padding 0.15s, opacity 0.3s;
      z-index: 10;
    }

    #hint {
      font-size: 0.95rem;
      color: #e91e8c;
      font-style: italic;
      min-height: 24px;
      margin-top: -8px;
    }

    /* CELEBRATION SCREEN */
    #celebration {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .big-emoji {
      font-size: 80px;
      animation: spin 0.6s ease-out;
    }
    @keyframes spin {
      0% { transform: rotate(-20deg) scale(0.5); }
      100% { transform: rotate(0deg) scale(1); }
    }

    #celebration h1 {
      font-size: 2.5rem;
      font-weight: 900;
      color: #c2185b;
    }

    #celebration .sub {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e91e8c;
    }

    #celebration .note {
      font-size: 1rem;
      color: #999;
    }

    /* CONFETTI */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
<div id="app">

  <canvas id="confetti-canvas"></canvas>

  <div id="question-screen">
    <div class="sticker">🐻🐼</div>
    <div class="question">Will you be my friend?</div>
    <div class="btn-row">
      <button id="yes-btn" onclick="onYes()">Yes! 💕</button>
    </div>
    <div id="hint"></div>
  </div>

  <div id="celebration">
    <div class="big-emoji">🎉🥳🎊</div>
    <h1>Congratulations!</h1>
    <div class="sub">You're my friend now!</div>
    <div class="note">No take-backs. It's official. 🤝</div>
  </div>

</div>

<script>
  let noClicks = 0;
  const hints = [
    "", "", "Hmm... are you sure? 🤔",
    "That's not the right button! 😅",
    "You keep missing... 👀",
    "Maybe try the other one? 💕",
    "The No button is running away... 😴",
    "Just click Yes already! 🥺",
    "No is scared of you now 😂",
  ];

  // Create and place No button
  const noBtn = document.createElement('button');
  noBtn.id = 'no-btn';
  noBtn.textContent = 'No';
  noBtn.onclick = onNo;
  document.body.appendChild(noBtn);

  // Place No button initially near Yes
  function placeNoBtnInitial() {
    const yesBtn = document.getElementById('yes-btn');
    const rect = yesBtn.getBoundingClientRect();
    noBtn.style.left = (rect.right + 16) + 'px';
    noBtn.style.top = rect.top + 'px';
  }
  window.addEventListener('load', placeNoBtnInitial);
  window.addEventListener('resize', () => { if (noClicks === 0) placeNoBtnInitial(); });

  function onNo() {
    noClicks++;
    const size = Math.max(9, 18 - noClicks * 1.5);
    const px = Math.max(8, 32 - noClicks * 2);
    const py = Math.max(4, 12 - noClicks);
    noBtn.style.fontSize = size + 'px';
    noBtn.style.padding = py + 'px ' + px + 'px';
    if (noClicks >= 6) noBtn.style.opacity = '0.3';

    const margin = 80;
    const maxX = window.innerWidth - noBtn.offsetWidth - margin;
    const maxY = window.innerHeight - noBtn.offsetHeight - margin;
    noBtn.style.left = (Math.random() * maxX + margin / 2) + 'px';
    noBtn.style.top = (Math.random() * maxY + margin / 2) + 'px';

    const hintEl = document.getElementById('hint');
    hintEl.textContent = hints[Math.min(noClicks, hints.length - 1)];

    if (noClicks >= 8) {
      noBtn.disabled = true;
      noBtn.style.opacity = '0.1';
      hintEl.textContent = "No is broken now. Just click Yes 😂";
    }
  }

  function onYes() {
    document.getElementById('question-screen').style.display = 'none';
    noBtn.style.display = 'none';
    const cel = document.getElementById('celebration');
    cel.style.display = 'flex';
    startConfetti();
  }

  function startConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = ['#e91e8c','#ff6eb0','#fff176','#80deea','#b39ddb','#a5d6a7','#ffcc80','#f48fb1','#ce93d8'];
    const pieces = Array.from({length: 100}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      w: Math.random() * 12 + 6,
      h: Math.random() * 7 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 2.5,
      vy: Math.random() * 3.5 + 1.5,
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 0.2
    }));

    let frame = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.vrot;
        if (p.y > canvas.height + 10) {
          p.y = -10;
          p.x = Math.random() * canvas.width;
        }
      });
      frame++;
      if (frame < 400) requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    draw();
  }
</script>
</body>
</html>
